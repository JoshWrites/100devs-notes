name: Validate notes

on:
  pull_request:
    paths:
      - 'notes/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --omit=optional

      - name: Validate changed note files
        run: |
          node scripts/validate-notes.js ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }}
