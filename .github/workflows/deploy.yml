name: Build index.json

on:
  push:
    branches: [main]
    paths:
      - 'notes/**'
      - 'scripts/build.js'
      - 'viewer.html'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install and Build
        run: |
          npm ci --omit=optional
          npm run build
          cp dist/index.json index.json

      - name: Commit index.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.json
          git diff --cached --quiet && echo "No changes" || git commit -m "Rebuild index.json [skip ci]" && git push

      - name: Check deploy secrets
        id: deploy-check
        run: |
          if [ -n "$DEPLOY_KEY" ]; then
            echo "enabled=true" >> $GITHUB_OUTPUT
          else
            echo "enabled=false" >> $GITHUB_OUTPUT
          fi
        env:
          DEPLOY_KEY: ${{ secrets.NOTES_DEPLOY_KEY }}

      - name: Deploy data to server
        if: steps.deploy-check.outputs.enabled == 'true'
        continue-on-error: true
        uses: easingthemes/ssh-deploy@v4
        env:
          SSH_PRIVATE_KEY: ${{ secrets.NOTES_DEPLOY_KEY }}
          REMOTE_HOST: ${{ secrets.NOTES_DEPLOY_HOST }}
          REMOTE_USER: ${{ secrets.NOTES_DEPLOY_USER }}
          REMOTE_PATH: ${{ secrets.NOTES_DEPLOY_PATH }}data/
          SOURCE: "dist/"
        with:
          args: "-avz --delete"
