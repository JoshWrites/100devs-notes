<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>100Devs Notes</title>
    <meta name="description" content="Community-maintained archive of notes from 100Devs huddle sessions." id="metaDesc">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="100Devs Notes">
    <meta property="og:title" content="100Devs Notes" id="ogTitle">
    <meta property="og:description" content="Community-maintained archive of notes from 100Devs huddle sessions." id="ogDesc">
    <meta property="og:url" content="" id="ogUrl">
    <meta property="og:image" content="https://levinelabs.co.il/assets/annymaster.jpeg">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="100Devs Notes" id="twTitle">
    <meta name="twitter:description" content="Community-maintained archive of notes from 100Devs huddle sessions." id="twDesc">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            overflow: hidden;
        }
        body {
            font-family: Helvetica, Arial, sans-serif;
            background: #fff;
            color: #111;
            display: flex;
            flex-direction: column;
        }

        /* ── Header ── */
        .page-header {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 20px 24px 16px;
        }
        .page-header img {
            width: 64px;
            height: 64px;
            border-radius: 50%;
        }
        .page-header .header-text { display: flex; flex-direction: column; }
        .page-header h1 {
            font-size: 2em;
            font-weight: normal;
            line-height: 1;
        }
        .page-header .social-links {
            display: flex;
            gap: 12px;
            margin-top: 4px;
        }
        .page-header .social-links a {
            color: #111;
            opacity: 0.5;
            display: flex;
            align-items: center;
        }
        .page-header .social-links a:hover { opacity: 1; }
        .page-header .social-links svg { width: 16px; height: 16px; fill: #111; }

        /* ── Layout ── */
        .layout {
            display: flex;
            flex: 1;
            min-height: 0;
            overflow: hidden;
            position: relative;
        }

        /* ── Sidebar ── */
        .sidebar {
            width: 210px;
            min-width: 210px;
            background: #111;
            color: #fff;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            position: relative;
            z-index: 20;
        }
        .sidebar-nav {
            display: flex;
            gap: 16px;
            padding: 16px 16px 12px;
            font-size: 1.05em;
            font-weight: bold;
            border-bottom: 1px solid #333;
        }
        .sidebar-nav a {
            color: #fff;
            text-decoration: none;
            opacity: 0.7;
        }
        .sidebar-nav a:hover, .sidebar-nav a.active { opacity: 1; }
        .sidebar-nav .sep { opacity: 0.3; }

        .sidebar-section {
            padding: 14px 16px;
        }
        .sidebar-section h3 {
            font-size: 0.8em;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #888;
            margin-bottom: 10px;
            font-weight: normal;
        }

        /* Tag filter buttons */
        .tag-filters {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .tag-filters button {
            padding: 4px 10px;
            font-size: 0.8em;
            border: 1px solid #444;
            background: transparent;
            color: #ccc;
            border-radius: 3px;
            cursor: pointer;
            font-family: inherit;
        }
        .tag-filters button:hover { border-color: #999; color: #fff; }
        .tag-filters button.active {
            background: #fff;
            color: #111;
            border-color: #fff;
        }

        /* Writer list */
        .writer-list {
            list-style: none;
        }
        .writer-list li {
            padding: 6px 0;
            font-size: 0.95em;
            cursor: pointer;
            color: #aaa;
        }
        .writer-list li:hover { color: #fff; }
        .writer-list li.active { color: #fff; font-weight: bold; }
        .writer-list .note-count {
            font-size: 0.75em;
            opacity: 0.5;
            margin-left: 4px;
        }

        /* ── Main content ── */
        .main {
            flex: 1;
            padding: 24px 32px;
            overflow-y: auto;
        }

        /* Writer + date list view */
        .writer-view {
            max-width: 210px;
        }
        .writer-view h2 {
            font-size: 1.4em;
            font-weight: normal;
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 1px solid #ddd;
        }
        .date-list {
            list-style: none;
        }
        .date-list li {
            padding: 8px 0;
            cursor: pointer;
            font-size: 1em;
            color: #333;
            border-bottom: 1px solid #f0f0f0;
        }
        .date-list li:hover { color: #000; background: #fafafa; }

        /* ── Slide-out date drawer ── */
        .date-drawer {
            position: absolute;
            top: 0;
            left: 210px;
            bottom: 0;
            width: 210px;
            background: #1a1a1a;
            color: #ccc;
            overflow-y: auto;
            transform: translateX(-100%);
            transition: transform 0.25s ease;
            z-index: 15;
            padding: 16px;
            pointer-events: none;
            box-shadow: 4px 0 12px rgba(0,0,0,0.3);
        }
        .date-drawer.open {
            transform: translateX(0);
            pointer-events: auto;
        }
        .drawer-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        .date-drawer h3 {
            font-size: 0.8em;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #888;
            font-weight: normal;
            margin: 0;
        }
        .drawer-close {
            width: 28px;
            height: 28px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 4px;
            flex-shrink: 0;
            background: none;
            border: none;
            padding: 2px;
        }
        .drawer-close span {
            display: block;
            height: 2px;
            width: 18px;
            background: #888;
            border-radius: 1px;
            pointer-events: none;
        }
        .drawer-close:hover span { background: #fff; }
        .date-drawer .drawer-list {
            list-style: none;
        }
        .date-drawer .drawer-list li {
            padding: 7px 0;
            cursor: pointer;
            font-size: 0.95em;
            color: #aaa;
            border-bottom: 1px solid #333;
        }
        .date-drawer .drawer-list li:hover { color: #fff; }

        /* Note content view */
        .note-view { display: none; }
        .note-view.active { display: block; }
        .note-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #eee;
        }
        .hamburger {
            width: 28px;
            height: 28px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 4px;
            flex-shrink: 0;
            background: none;
            border: none;
            padding: 2px;
            font-family: inherit;
        }
        .hamburger span {
            display: block;
            height: 2px;
            width: 18px;
            background: #333;
            border-radius: 1px;
            pointer-events: none;
        }
        .hamburger:hover span { background: #000; }
        .note-header-label {
            font-size: 1em;
            color: #444;
            cursor: pointer;
        }
        .note-header-label:hover { color: #111; }
        .note-meta {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 8px;
        }
        .note-view h2 {
            font-size: 1.3em;
            font-weight: normal;
            margin-bottom: 16px;
        }
        .note-body { line-height: 1.7; }
        .note-body h1, .note-body h2, .note-body h3 { margin: 1.2em 0 0.5em; font-size: 1.1em; }
        .note-body p { margin: 0.5em 0; }
        .note-body ul, .note-body ol { margin: 0.5em 0; padding-left: 1.5em; }
        .note-body pre {
            background: #f5f5f5;
            padding: 12px;
            overflow-x: auto;
            font-size: 0.9em;
            margin: 0.5em 0;
            border-radius: 4px;
        }
        .note-body code {
            background: #f5f5f5;
            padding: 2px 6px;
            font-size: 0.9em;
            border-radius: 3px;
        }
        .note-body pre code { background: none; padding: 0; }

        /* Empty / prompt state */
        .prompt {
            color: #999;
            font-size: 1em;
            padding-top: 40px;
        }

        .empty-state {
            color: #999;
            font-style: italic;
            padding: 16px 0;
        }
        .error-state {
            color: #c00;
            padding-top: 40px;
        }

        /* Search input */
        .search-wrap {
            padding: 12px 16px 0;
        }
        .search-wrap input {
            width: 100%;
            padding: 6px 10px;
            font-size: 0.85em;
            font-family: inherit;
            background: #222;
            border: 1px solid #444;
            border-radius: 3px;
            color: #fff;
            outline: none;
        }
        .search-wrap input::placeholder { color: #666; }
        .search-wrap input:focus { border-color: #888; }

        /* Dimmed writer when no results */
        .writer-list li.dimmed { opacity: 0.35; }

        /* All-notes flat list */
        .all-notes-list {
            list-style: none;
            max-width: 600px;
        }
        .all-notes-list li {
            display: flex;
            align-items: baseline;
            gap: 10px;
            padding: 9px 0;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
        }
        .all-notes-list li:hover { background: #fafafa; }
        .card-date {
            font-size: 0.9em;
            color: #555;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .card-author {
            font-size: 0.95em;
            color: #111;
            font-weight: 500;
        }
        .card-tags {
            font-size: 0.78em;
            color: #999;
        }


        /* Mobile menu button (hidden on desktop) */
        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
            flex-direction: column;
            justify-content: center;
            gap: 4px;
            flex-shrink: 0;
        }
        .mobile-menu-btn span {
            display: block;
            height: 2px;
            width: 20px;
            background: #111;
            border-radius: 1px;
        }

        /* Sidebar overlay (mobile) */
        .sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 19;
        }
        .sidebar-overlay.open { display: block; }

        /* Mobile layout */
        @media (max-width: 640px) {
            .mobile-menu-btn { display: flex; }
            .sidebar {
                position: fixed;
                top: 0; left: 0; bottom: 0;
                transform: translateX(-100%);
                transition: transform 0.25s ease;
                z-index: 20;
            }
            .sidebar.open { transform: translateX(0); }
            .date-drawer { left: 0; }
            .main { padding: 16px; }
            .page-header { padding: 12px 16px; }
            .page-header h1 { font-size: 1.4em; }
            .page-header img { width: 44px; height: 44px; }
        }

        /* Print styles */
        @media print {
            html, body { height: auto; overflow: visible; }
            .page-header, .sidebar, .sidebar-overlay,
            .date-drawer, .note-header { display: none !important; }
            .layout { display: block; }
            .main { padding: 0; overflow: visible; height: auto; }
            .note-view { display: block !important; }
            .note-body a::after { content: " (" attr(href) ")"; font-size: 0.85em; color: #555; }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
</head>

<script>
    let notes = [];
    let selectedTags = new Set();
    let selectedWriter = null; // null = none, '__all__' = all notes, string = specific writer
    let searchQuery = '';

    async function load() {
        try {
            const res = await fetch('index.json');
            if (!res.ok) throw new Error('Failed to load notes (' + res.status + ')');
            notes = await res.json();
            buildSidebar();
        } catch (err) {
            document.getElementById('promptState').className = 'error-state';
            document.getElementById('promptState').textContent = 'Could not load notes: ' + err.message;
        }
        return true;
    }

    function formatDate(iso) {
        var parts = String(iso).slice(0, 10).split('-');
        if (parts.length !== 3) return iso;
        return parts[2] + '/' + parts[1] + '/' + parts[0];
    }

    function escapeHtml(s) {
        const d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
    }

    function stripHtml(html) {
        const d = document.createElement('div');
        d.innerHTML = html;
        return d.textContent || '';
    }

    function matchesSearch(note, query) {
        if (!query) return true;
        const q = query.toLowerCase();
        return note.author.toLowerCase().includes(q)
            || note.date.includes(q)
            || note.tags.some(t => t.toLowerCase().includes(q))
            || stripHtml(note.html).toLowerCase().includes(q);
    }

    function getWriters() {
        const map = {};
        notes.forEach(n => {
            if (!map[n.author]) map[n.author] = 0;
            map[n.author]++;
        });
        return Object.entries(map).sort((a, b) => a[0].localeCompare(b[0]));
    }

    function getTags() {
        const s = new Set();
        notes.forEach(n => n.tags.forEach(t => s.add(t)));
        return [...s].sort();
    }

    function getWriterNotes(author) {
        return notes
            .filter(n => n.author === author)
            .filter(n => selectedTags.size === 0 || n.tags.some(t => selectedTags.has(t)))
            .filter(n => matchesSearch(n, searchQuery))
            .sort((a, b) => b.date.localeCompare(a.date));
    }

    function getAllNotes() {
        return notes
            .filter(n => selectedTags.size === 0 || n.tags.some(t => selectedTags.has(t)))
            .filter(n => matchesSearch(n, searchQuery))
            .sort((a, b) => b.date.localeCompare(a.date));
    }

    function buildSidebar() {
        const tags = getTags();
        const tagEl = document.getElementById('tagFilters');
        tagEl.innerHTML = tags.map(t =>
            '<button type="button" data-tag="' + t + '">' + escapeHtml(t) + '</button>'
        ).join('');
        tagEl.querySelectorAll('button').forEach(btn => {
            btn.onclick = function() {
                var tag = btn.dataset.tag;
                if (selectedTags.has(tag)) selectedTags.delete(tag);
                else selectedTags.add(tag);
                btn.classList.toggle('active');
                updateWriterCounts();
                if (selectedWriter === '__all__') showAllNotes();
                else if (selectedWriter) showWriter(selectedWriter);
            };
        });
        updateWriterCounts();
    }

    function updateWriterCounts() {
        var allFiltered = getAllNotes();
        var writers = getWriters();
        var listEl = document.getElementById('writerList');
        var hasActiveFilter = selectedTags.size > 0 || searchQuery;

        var allCls = selectedWriter === '__all__' ? 'active' : '';
        if (allFiltered.length === 0 && hasActiveFilter) allCls += ' dimmed';
        var allItem = '<li class="' + allCls + '" data-author="__all__">'
            + 'All notes'
            + '<span class="note-count">(' + allFiltered.length + ')</span>'
            + '</li>';

        listEl.innerHTML = allItem + writers.map(function(w) {
            var author = w[0];
            var filtered = getWriterNotes(author);
            var cls = selectedWriter === author ? 'active' : '';
            if (filtered.length === 0 && hasActiveFilter) cls += ' dimmed';
            return '<li class="' + cls + '" data-author="' + escapeHtml(author) + '">'
                + escapeHtml(author)
                + '<span class="note-count">(' + filtered.length + ')</span>'
                + '</li>';
        }).join('');

        listEl.querySelectorAll('li').forEach(function(li) {
            li.onclick = function() {
                if (li.dataset.author === '__all__') showAllNotes();
                else showWriter(li.dataset.author);
            };
        });
    }

    function tagTooltip(n) {
        var visible = n.tags.filter(function(t) { return t !== 'the-hunt'; });
        return visible.length ? visible.join(', ') : '';
    }

    function buildDateItems(filtered, container, onClickNote) {
        container.innerHTML = filtered.map(function(n) {
            return '<li data-slug="' + n.slug + '" title="' + escapeHtml(tagTooltip(n)) + '">'
                + formatDate(n.date)
                + '</li>';
        }).join('');
        container.querySelectorAll('li').forEach(function(li) {
            li.onclick = function() { onClickNote(li.dataset.slug); };
        });
    }

    function showAllNotes() {
        selectedWriter = '__all__';
        updateWriterCounts();
        closeDrawer();

        document.getElementById('promptState').style.display = 'none';
        document.getElementById('noteView').classList.remove('active');
        document.getElementById('writerView').style.display = 'none';
        var av = document.getElementById('allNotesView');
        av.style.display = '';

        var filtered = getAllNotes();
        var listEl = document.getElementById('allNotesList');
        var emptyEl = document.getElementById('allNotesEmpty');

        if (filtered.length === 0) {
            listEl.innerHTML = '';
            emptyEl.style.display = '';
            return;
        }
        emptyEl.style.display = 'none';
        listEl.innerHTML = filtered.map(function(n) {
            var extraTags = n.tags.filter(function(t) { return t !== 'the-hunt'; });
            return '<li data-slug="' + n.slug + '">'
                + '<span class="card-date">' + escapeHtml(formatDate(n.date)) + '</span>'
                + '<span class="card-author">' + escapeHtml(n.author) + '</span>'
                + (extraTags.length ? '<span class="card-tags">' + escapeHtml(extraTags.join(', ')) + '</span>' : '')
                + '</li>';
        }).join('');
        listEl.querySelectorAll('li').forEach(function(li) {
            li.onclick = function() { showNote(li.dataset.slug); };
        });
    }

    function showWriter(author) {
        selectedWriter = author;
        updateWriterCounts();
        closeDrawer();

        document.getElementById('promptState').style.display = 'none';
        document.getElementById('noteView').classList.remove('active');
        document.getElementById('allNotesView').style.display = 'none';
        var wv = document.getElementById('writerView');
        wv.style.display = '';

        document.getElementById('writerName').textContent = author;

        var filtered = getWriterNotes(author);
        var dateEl = document.getElementById('dateList');
        var emptyEl = document.getElementById('emptyDates');

        if (filtered.length === 0) {
            dateEl.innerHTML = '';
            emptyEl.style.display = '';
            return;
        }
        emptyEl.style.display = 'none';
        buildDateItems(filtered, dateEl, showNote);
    }

    function populateDrawer(author) {
        var filtered = getWriterNotes(author);
        var list = document.getElementById('drawerList');
        document.getElementById('drawerTitle').textContent = author;
        buildDateItems(filtered, list, function(slug) {
            closeDrawer();
            showNote(slug);
        });
    }

    function toggleDrawer() {
        document.getElementById('dateDrawer').classList.toggle('open');
    }

    function closeDrawer() {
        document.getElementById('dateDrawer').classList.remove('open');
    }

    function showNote(slug) {
        var note = notes.find(function(n) { return n.slug === slug; });
        if (!note) return;

        closeDrawer();
        document.getElementById('writerView').style.display = 'none';
        document.getElementById('allNotesView').style.display = 'none';
        var nv = document.getElementById('noteView');
        nv.classList.add('active');

        document.getElementById('noteHeaderLabel').textContent = note.author + "'s notes";
        populateDrawer(note.author);

        document.getElementById('noteMeta').innerHTML = '<strong>' + escapeHtml(formatDate(note.date)) + '</strong>'
            + (note.tags.length ? ' · ' + escapeHtml(note.tags.join(', ')) : '');
        document.getElementById('noteBody').innerHTML = DOMPurify.sanitize(note.html);

        document.getElementById('noteHamburger').onclick = toggleDrawer;
        document.getElementById('noteHeaderLabel').onclick = toggleDrawer;

        document.querySelector('.main').scrollTop = 0;
    }

    // ── Deep linking ──────────────────────────────────────────────
    function setHash(slug) {
        history.replaceState(null, '', slug ? '#' + slug : location.pathname + location.search);
    }

    function updateMeta(title, description) {
        document.title = title;
        document.getElementById('ogTitle').setAttribute('content', title);
        document.getElementById('ogDesc').setAttribute('content', description);
        document.getElementById('ogUrl').setAttribute('content', location.href);
        document.getElementById('twTitle').setAttribute('content', title);
        document.getElementById('twDesc').setAttribute('content', description);
        document.getElementById('metaDesc').setAttribute('content', description);
    }

    function navigateToHash() {
        var slug = location.hash.slice(1);
        if (!slug || !notes.length) return;
        var note = notes.find(function(n) { return n.slug === slug; });
        if (note) showNote(slug, true);
    }

    // ── Mobile sidebar ────────────────────────────────────────────
    function openSidebar() {
        document.querySelector('.sidebar').classList.add('open');
        document.getElementById('sidebarOverlay').classList.add('open');
    }
    function closeSidebar() {
        document.querySelector('.sidebar').classList.remove('open');
        document.getElementById('sidebarOverlay').classList.remove('open');
    }

    // ── Wrap showNote to add deep linking + title + OG ──────────
    var _baseShowNote = showNote;
    showNote = function(slug, fromHash) {
        _baseShowNote(slug);
        closeSidebar();
        var note = notes.find(function(n) { return n.slug === slug; });
        if (!note) return;
        if (!fromHash) setHash(slug);
        var desc = stripHtml(note.html).trim().slice(0, 160).replace(/\s+/g, ' ');
        updateMeta(note.author + ' · ' + formatDate(note.date) + ' — 100Devs Notes', desc);
    };

    var _origShowWriter = showWriter;
    showWriter = function(author) {
        _origShowWriter(author);
        closeSidebar();
        setHash('');
        updateMeta('100Devs Notes', 'Community-maintained archive of notes from 100Devs huddle sessions.');
    };

    var _origShowAllNotes = showAllNotes;
    showAllNotes = function() {
        _origShowAllNotes();
        closeSidebar();
        setHash('');
        updateMeta('100Devs Notes', 'Community-maintained archive of notes from 100Devs huddle sessions.');
    };

    load().then(navigateToHash);
    document.getElementById('drawerClose').onclick = closeDrawer;
    document.getElementById('searchInput').addEventListener('input', function() {
        searchQuery = this.value.trim();
        updateWriterCounts();
        if (selectedWriter === '__all__') showAllNotes();
        else if (selectedWriter) showWriter(selectedWriter);
    });
    document.getElementById('mobileMenuBtn').onclick = openSidebar;
    document.getElementById('sidebarOverlay').onclick = closeSidebar;
    window.addEventListener('hashchange', navigateToHash);
</script>

</body>
</html>
