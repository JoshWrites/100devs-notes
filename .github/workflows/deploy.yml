name: Build index.json

on:
  push:
    branches: [main]
    paths:
      - 'notes/**'
      - 'scripts/build.js'
      - 'viewer.html'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install and Build
        run: |
          npm ci --omit=optional
          npm run build
          cp dist/index.json index.json

      - name: Commit index.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.json
          git diff --cached --quiet && echo "No changes" || git commit -m "Rebuild index.json [skip ci]" && git push
