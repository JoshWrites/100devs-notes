<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>100Devs Notes</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            overflow: hidden;
        }
        body {
            font-family: Helvetica, Arial, sans-serif;
            background: #fff;
            color: #111;
            display: flex;
            flex-direction: column;
        }

        /* ── Header ── */
        .page-header {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 20px 24px 16px;
        }
        .page-header img {
            width: 64px;
            height: 64px;
            border-radius: 50%;
        }
        .page-header .header-text { display: flex; flex-direction: column; }
        .page-header h1 {
            font-size: 2em;
            font-weight: normal;
            line-height: 1;
        }
        .page-header .social-links {
            display: flex;
            gap: 12px;
            margin-top: 4px;
        }
        .page-header .social-links a {
            color: #111;
            opacity: 0.5;
            display: flex;
            align-items: center;
        }
        .page-header .social-links a:hover { opacity: 1; }
        .page-header .social-links svg { width: 16px; height: 16px; fill: #111; }

        /* ── Layout ── */
        .layout {
            display: flex;
            flex: 1;
            min-height: 0;
            overflow: hidden;
            position: relative;
        }

        /* ── Sidebar ── */
        .sidebar {
            width: 210px;
            min-width: 210px;
            background: #111;
            color: #fff;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            position: relative;
            z-index: 20;
        }
        .sidebar-nav {
            display: flex;
            gap: 16px;
            padding: 16px 16px 12px;
            font-size: 1.05em;
            font-weight: bold;
            border-bottom: 1px solid #333;
        }
        .sidebar-nav a {
            color: #fff;
            text-decoration: none;
            opacity: 0.7;
        }
        .sidebar-nav a:hover, .sidebar-nav a.active { opacity: 1; }
        .sidebar-nav .sep { opacity: 0.3; }

        .sidebar-section {
            padding: 14px 16px;
        }
        .sidebar-section h3 {
            font-size: 0.8em;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #888;
            margin-bottom: 10px;
            font-weight: normal;
        }

        /* Tag filter buttons */
        .tag-filters {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .tag-filters button {
            padding: 4px 10px;
            font-size: 0.8em;
            border: 1px solid #444;
            background: transparent;
            color: #ccc;
            border-radius: 3px;
            cursor: pointer;
            font-family: inherit;
        }
        .tag-filters button:hover { border-color: #999; color: #fff; }
        .tag-filters button.active {
            background: #fff;
            color: #111;
            border-color: #fff;
        }

        /* Writer list */
        .writer-list {
            list-style: none;
        }
        .writer-list li {
            padding: 6px 0;
            font-size: 0.95em;
            cursor: pointer;
            color: #aaa;
        }
        .writer-list li:hover { color: #fff; }
        .writer-list li.active { color: #fff; font-weight: bold; }
        .writer-list .note-count {
            font-size: 0.75em;
            opacity: 0.5;
            margin-left: 4px;
        }

        /* ── Main content ── */
        .main {
            flex: 1;
            padding: 24px 32px;
            overflow-y: auto;
        }

        /* Writer + date list view */
        .writer-view {
            max-width: 210px;
        }
        .writer-view h2 {
            font-size: 1.4em;
            font-weight: normal;
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 1px solid #ddd;
        }
        .date-list {
            list-style: none;
        }
        .date-list li {
            padding: 8px 0;
            cursor: pointer;
            font-size: 1em;
            color: #333;
            border-bottom: 1px solid #f0f0f0;
        }
        .date-list li:hover { color: #000; background: #fafafa; }

        /* ── Slide-out date drawer ── */
        .date-drawer {
            position: absolute;
            top: 0;
            left: 210px;
            bottom: 0;
            width: 210px;
            background: #1a1a1a;
            color: #ccc;
            overflow-y: auto;
            transform: translateX(-100%);
            transition: transform 0.25s ease;
            z-index: 15;
            padding: 16px;
            pointer-events: none;
            box-shadow: 4px 0 12px rgba(0,0,0,0.3);
        }
        .date-drawer.open {
            transform: translateX(0);
            pointer-events: auto;
        }
        .drawer-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        .date-drawer h3 {
            font-size: 0.8em;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #888;
            font-weight: normal;
            margin: 0;
        }
        .drawer-close {
            width: 28px;
            height: 28px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 4px;
            flex-shrink: 0;
            background: none;
            border: none;
            padding: 2px;
        }
        .drawer-close span {
            display: block;
            height: 2px;
            width: 18px;
            background: #888;
            border-radius: 1px;
            pointer-events: none;
        }
        .drawer-close:hover span { background: #fff; }
        .date-drawer .drawer-list {
            list-style: none;
        }
        .date-drawer .drawer-list li {
            padding: 7px 0;
            cursor: pointer;
            font-size: 0.95em;
            color: #aaa;
            border-bottom: 1px solid #333;
        }
        .date-drawer .drawer-list li:hover { color: #fff; }

        /* Note content view */
        .note-view { display: none; }
        .note-view.active { display: block; }
        .note-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #eee;
        }
        .hamburger {
            width: 28px;
            height: 28px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 4px;
            flex-shrink: 0;
            background: none;
            border: none;
            padding: 2px;
            font-family: inherit;
        }
        .hamburger span {
            display: block;
            height: 2px;
            width: 18px;
            background: #333;
            border-radius: 1px;
            pointer-events: none;
        }
        .hamburger:hover span { background: #000; }
        .note-header-label {
            font-size: 1em;
            color: #444;
            cursor: pointer;
        }
        .note-header-label:hover { color: #111; }
        .note-meta {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 8px;
        }
        .note-view h2 {
            font-size: 1.3em;
            font-weight: normal;
            margin-bottom: 16px;
        }
        .note-body { line-height: 1.7; }
        .note-body h1, .note-body h2, .note-body h3 { margin: 1.2em 0 0.5em; font-size: 1.1em; }
        .note-body p { margin: 0.5em 0; }
        .note-body ul, .note-body ol { margin: 0.5em 0; padding-left: 1.5em; }
        .note-body pre {
            background: #f5f5f5;
            padding: 12px;
            overflow-x: auto;
            font-size: 0.9em;
            margin: 0.5em 0;
            border-radius: 4px;
        }
        .note-body code {
            background: #f5f5f5;
            padding: 2px 6px;
            font-size: 0.9em;
            border-radius: 3px;
        }
        .note-body pre code { background: none; padding: 0; }

        /* Empty / prompt state */
        .prompt {
            color: #999;
            font-size: 1em;
            padding-top: 40px;
        }

        .empty-state {
            color: #999;
            font-style: italic;
            padding: 16px 0;
        }
        .error-state {
            color: #c00;
            padding-top: 40px;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
</head>
<body>

    <!-- Header: Anny photo + name + socials -->
    <div class="page-header">
        <img src="https://levinelabs.co.il/assets/annymaster.jpeg" alt="Anny Levine">
        <div class="header-text">
            <h1>ANNY</h1>
            <div class="social-links">
                <a href="https://www.linkedin.com/in/annylevine/" target="_blank" title="LinkedIn">
                    <svg viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
                </a>
                <a href="https://instagram.com/levine_anny" target="_blank" title="Instagram">
                    <svg viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg>
                </a>
                <a href="https://bsky.app/profile/annylev.bsky.social" target="_blank" title="Bluesky">
                    <svg viewBox="0 0 24 24"><path d="M12 10.8c-1.087-2.114-4.046-6.053-6.798-7.995C2.566.944 1.561 1.266.902 1.565.139 1.908 0 3.08 0 3.768c0 .69.378 5.65.624 6.479.815 2.736 3.713 3.66 6.383 3.364.136-.02.275-.039.415-.056-.138.022-.276.04-.415.056-3.912.58-7.387 2.005-2.83 7.078 5.013 5.19 6.87-1.113 7.823-4.308.953 3.195 2.05 9.271 7.733 4.308 4.267-4.308 1.172-6.498-2.74-7.078a8.741 8.741 0 01-.415-.056c.14.017.279.036.415.056 2.67.297 5.568-.628 6.383-3.364.246-.828.624-5.79.624-6.478 0-.69-.139-1.861-.902-2.204-.659-.298-1.664-.62-4.3 1.24C16.046 4.748 13.087 8.687 12 10.8z"/></svg>
                </a>
            </div>
        </div>
    </div>

    <div class="layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-nav">
                <a href="https://levinelabs.co.il/anny.html">100devs</a>
                <span class="sep">|</span>
                <a href="#" class="active">our notes</a>
            </div>

            <div class="sidebar-section">
                <h3>filters</h3>
                <div class="tag-filters" id="tagFilters"></div>
            </div>

            <div class="sidebar-section">
                <h3>writers</h3>
                <ul class="writer-list" id="writerList"></ul>
            </div>
        </aside>

        <!-- Date drawer (slides out from under sidebar) -->
        <div class="date-drawer" id="dateDrawer">
            <div class="drawer-header">
                <h3 id="drawerTitle">dates</h3>
                <button class="drawer-close" id="drawerClose" aria-label="Close date list">
                    <span></span><span></span><span></span>
                </button>
            </div>
            <ul class="drawer-list" id="drawerList"></ul>
        </div>

        <!-- Main content area -->
        <div class="main" id="mainContent">
            <div class="prompt" id="promptState">Select a writer to view their notes.</div>

            <div class="writer-view" id="writerView" style="display:none;">
                <h2 id="writerName"></h2>
                <ul class="date-list" id="dateList"></ul>
                <div class="empty-state" id="emptyDates" style="display:none;">No notes match the current filters.</div>
            </div>

            <div class="note-view" id="noteView">
                <div class="note-header" id="noteHeader">
                    <button class="hamburger" id="noteHamburger" aria-label="Toggle date list">
                        <span></span><span></span><span></span>
                    </button>
                    <span class="note-header-label" id="noteHeaderLabel"></span>
                </div>
                <div class="note-meta" id="noteMeta"></div>
                <div class="note-body" id="noteBody"></div>
            </div>
        </div>
    </div>

<script>
    let notes = [];
    let selectedTags = new Set();
    let selectedWriter = null;

    async function load() {
        try {
            const res = await fetch('index.json');
            if (!res.ok) throw new Error('Failed to load notes (' + res.status + ')');
            notes = await res.json();
            buildSidebar();
        } catch (err) {
            document.getElementById('promptState').className = 'error-state';
            document.getElementById('promptState').textContent = 'Could not load notes: ' + err.message;
        }
    }

    function escapeHtml(s) {
        const d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
    }

    function getWriters() {
        const map = {};
        notes.forEach(n => {
            if (!map[n.author]) map[n.author] = 0;
            map[n.author]++;
        });
        return Object.entries(map).sort((a, b) => a[0].localeCompare(b[0]));
    }

    function getTags() {
        const s = new Set();
        notes.forEach(n => n.tags.forEach(t => s.add(t)));
        return [...s].sort();
    }

    function getWriterNotes(author) {
        return notes
            .filter(n => n.author === author)
            .filter(n => selectedTags.size === 0 || n.tags.some(t => selectedTags.has(t)))
            .sort((a, b) => b.date.localeCompare(a.date));
    }

    function buildSidebar() {
        const tags = getTags();
        const tagEl = document.getElementById('tagFilters');
        tagEl.innerHTML = tags.map(t =>
            '<button type="button" data-tag="' + t + '">' + escapeHtml(t) + '</button>'
        ).join('');
        tagEl.querySelectorAll('button').forEach(btn => {
            btn.onclick = function() {
                var tag = btn.dataset.tag;
                if (selectedTags.has(tag)) selectedTags.delete(tag);
                else selectedTags.add(tag);
                btn.classList.toggle('active');
                updateWriterCounts();
                if (selectedWriter) showWriter(selectedWriter);
            };
        });
        updateWriterCounts();
    }

    function updateWriterCounts() {
        var writers = getWriters();
        var listEl = document.getElementById('writerList');
        listEl.innerHTML = writers.map(function(w) {
            var author = w[0];
            var filtered = getWriterNotes(author);
            var cls = selectedWriter === author ? 'active' : '';
            if (filtered.length === 0 && selectedTags.size > 0) cls += ' dimmed';
            return '<li class="' + cls + '" data-author="' + escapeHtml(author) + '">'
                + escapeHtml(author)
                + '<span class="note-count">(' + filtered.length + ')</span>'
                + '</li>';
        }).join('');
        listEl.querySelectorAll('li').forEach(function(li) {
            li.onclick = function() { showWriter(li.dataset.author); };
        });
    }

    function tagTooltip(n) {
        var visible = n.tags.filter(function(t) { return t !== 'the-hunt'; });
        return visible.length ? visible.join(', ') : '';
    }

    function buildDateItems(filtered, container, onClickNote) {
        container.innerHTML = filtered.map(function(n) {
            return '<li data-slug="' + n.slug + '" title="' + escapeHtml(tagTooltip(n)) + '">'
                + n.date
                + '</li>';
        }).join('');
        container.querySelectorAll('li').forEach(function(li) {
            li.onclick = function() { onClickNote(li.dataset.slug); };
        });
    }

    function showWriter(author) {
        selectedWriter = author;
        updateWriterCounts();
        closeDrawer();

        document.getElementById('promptState').style.display = 'none';
        document.getElementById('noteView').classList.remove('active');
        var wv = document.getElementById('writerView');
        wv.style.display = '';

        document.getElementById('writerName').textContent = author;

        var filtered = getWriterNotes(author);
        var dateEl = document.getElementById('dateList');
        var emptyEl = document.getElementById('emptyDates');

        if (filtered.length === 0) {
            dateEl.innerHTML = '';
            emptyEl.style.display = '';
            return;
        }
        emptyEl.style.display = 'none';
        buildDateItems(filtered, dateEl, showNote);
    }

    function populateDrawer(author) {
        var filtered = getWriterNotes(author);
        var list = document.getElementById('drawerList');
        document.getElementById('drawerTitle').textContent = author;
        buildDateItems(filtered, list, function(slug) {
            closeDrawer();
            showNote(slug);
        });
    }

    function toggleDrawer() {
        document.getElementById('dateDrawer').classList.toggle('open');
    }

    function closeDrawer() {
        document.getElementById('dateDrawer').classList.remove('open');
    }

    function showNote(slug) {
        var note = notes.find(function(n) { return n.slug === slug; });
        if (!note) return;

        closeDrawer();
        document.getElementById('writerView').style.display = 'none';
        var nv = document.getElementById('noteView');
        nv.classList.add('active');

        document.getElementById('noteHeaderLabel').textContent = note.author + "'s notes";
        populateDrawer(note.author);

        document.getElementById('noteMeta').textContent = note.date
            + (note.tags.length ? ' · ' + note.tags.join(', ') : '');
        document.getElementById('noteBody').innerHTML = DOMPurify.sanitize(note.html);

        document.getElementById('noteHamburger').onclick = toggleDrawer;
        document.getElementById('noteHeaderLabel').onclick = toggleDrawer;

        document.querySelector('.main').scrollTop = 0;
    }

    load();
    document.getElementById('drawerClose').onclick = closeDrawer;
</script>

</body>
</html>
