<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>100Devs Notes</title>
    <meta name="description" content="Community-maintained archive of notes from 100Devs huddle sessions." id="metaDesc">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="100Devs Notes">
    <meta property="og:title" content="100Devs Notes" id="ogTitle">
    <meta property="og:description" content="Community-maintained archive of notes from 100Devs huddle sessions." id="ogDesc">
    <meta property="og:url" content="" id="ogUrl">
    <meta property="og:image" content="https://levinelabs.co.il/assets/annymaster.jpeg">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            overflow: hidden;
        }
        body {
            font-family: Helvetica, Arial, sans-serif;
            background: #fff;
            color: #111;
            display: flex;
            flex-direction: column;
        }

        /* ── Header ── */
        .page-header {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 20px 24px 16px;
        }
        .page-header img {
            width: 64px;
            height: 64px;
            border-radius: 50%;
        }
        .page-header .header-text { display: flex; flex-direction: column; }
        .page-header h1 {
            font-size: 2em;
            font-weight: normal;
            line-height: 1;
        }
        .page-header .social-links {
            display: flex;
            gap: 12px;
            margin-top: 4px;
        }
        .page-header .social-links a {
            color: #111;
            opacity: 0.5;
            display: flex;
            align-items: center;
        }
        .page-header .social-links a:hover { opacity: 1; }
        .page-header .social-links svg { width: 16px; height: 16px; fill: #111; }

        /* ── Layout ── */
        .layout {
            display: flex;
            flex: 1;
            min-height: 0;
            overflow: hidden;
            position: relative;
        }

        /* ── Sidebar ── */
        .sidebar {
            width: 210px;
            min-width: 210px;
            background: #111;
            color: #fff;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            position: relative;
            z-index: 20;
        }
        .sidebar-nav {
            display: flex;
            gap: 16px;
            padding: 16px 16px 12px;
            font-size: 1.05em;
            font-weight: bold;
            border-bottom: 1px solid #333;
        }
        .sidebar-nav a {
            color: #fff;
            text-decoration: none;
            opacity: 0.7;
        }
        .sidebar-nav a:hover, .sidebar-nav a.active { opacity: 1; }
        .sidebar-nav .sep { opacity: 0.3; }

        .sidebar-section {
            padding: 14px 16px;
        }
        .sidebar-section h3 {
            font-size: 0.8em;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #888;
            margin-bottom: 10px;
            font-weight: normal;
        }

        /* Tag filter buttons */
        .tag-filters {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .tag-filters button {
            padding: 4px 10px;
            font-size: 0.8em;
            border: 1px solid #444;
            background: transparent;
            color: #ccc;
            border-radius: 3px;
            cursor: pointer;
            font-family: inherit;
        }
        .tag-filters button:hover { border-color: #999; color: #fff; }
        .tag-filters button.active {
            background: #fff;
            color: #111;
            border-color: #fff;
        }

        /* Writer list */
        .writer-list {
            list-style: none;
        }
        .writer-list li {
            padding: 6px 0;
            font-size: 0.95em;
            cursor: pointer;
            color: #aaa;
        }
        .writer-list li:hover { color: #fff; }
        .writer-list li.active { color: #fff; font-weight: bold; }
        .writer-list .note-count {
            font-size: 0.75em;
            opacity: 0.5;
            margin-left: 4px;
        }

        /* ── Main content ── */
        .main {
            flex: 1;
            padding: 24px 32px;
            overflow-y: auto;
        }

        /* Writer + date list view */
        .writer-view {
            max-width: 210px;
        }
        .writer-view h2 {
            font-size: 1.4em;
            font-weight: normal;
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 1px solid #ddd;
        }
        .date-list {
            list-style: none;
        }
        .date-list li {
            padding: 8px 0;
            cursor: pointer;
            font-size: 1em;
            color: #333;
            border-bottom: 1px solid #f0f0f0;
        }
        .date-list li:hover { color: #000; background: #fafafa; }

        /* ── Slide-out date drawer ── */
        .date-drawer {
            position: absolute;
            top: 0;
            left: 210px;
            bottom: 0;
            width: 210px;
            background: #1a1a1a;
            color: #ccc;
            overflow-y: auto;
            transform: translateX(-100%);
            transition: transform 0.25s ease;
            z-index: 15;
            padding: 16px;
            pointer-events: none;
            box-shadow: 4px 0 12px rgba(0,0,0,0.3);
        }
        .date-drawer.open {
            transform: translateX(0);
            pointer-events: auto;
        }
        .drawer-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        .date-drawer h3 {
            font-size: 0.8em;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #888;
            font-weight: normal;
            margin: 0;
        }
        .drawer-close {
            width: 28px;
            height: 28px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 4px;
            flex-shrink: 0;
            background: none;
            border: none;
            padding: 2px;
        }
        .drawer-close span {
            display: block;
            height: 2px;
            width: 18px;
            background: #888;
            border-radius: 1px;
            pointer-events: none;
        }
        .drawer-close:hover span { background: #fff; }
        .date-drawer .drawer-list {
            list-style: none;
        }
        .date-drawer .drawer-list li {
            padding: 7px 0;
            cursor: pointer;
            font-size: 0.95em;
            color: #aaa;
            border-bottom: 1px solid #333;
        }
        .date-drawer .drawer-list li:hover { color: #fff; }

        /* Note content view */
        .note-view { display: none; }
        .note-view.active { display: block; }
        .note-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #eee;
        }
        .hamburger {
            width: 28px;
            height: 28px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 4px;
            flex-shrink: 0;
            background: none;
            border: none;
            padding: 2px;
            font-family: inherit;
        }
        .hamburger span {
            display: block;
            height: 2px;
            width: 18px;
            background: #333;
            border-radius: 1px;
            pointer-events: none;
        }
        .hamburger:hover span { background: #000; }
        .note-header-label {
            font-size: 1em;
            color: #444;
            cursor: pointer;
        }
        .note-header-label:hover { color: #111; }
        .note-meta {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 8px;
        }
        .note-view h2 {
            font-size: 1.3em;
            font-weight: normal;
            margin-bottom: 16px;
        }
        .note-body { line-height: 1.7; }
        .note-body h1, .note-body h2, .note-body h3 { margin: 1.2em 0 0.5em; font-size: 1.1em; }
        .note-body p { margin: 0.5em 0; }
        .note-body ul, .note-body ol { margin: 0.5em 0; padding-left: 1.5em; }
        .note-body pre {
            background: #f5f5f5;
            padding: 12px;
            overflow-x: auto;
            font-size: 0.9em;
            margin: 0.5em 0;
            border-radius: 4px;
        }
        .note-body code {
            background: #f5f5f5;
            padding: 2px 6px;
            font-size: 0.9em;
            border-radius: 3px;
        }
        .note-body pre code { background: none; padding: 0; }

        /* Empty / prompt state */
        .prompt {
            color: #999;
            font-size: 1em;
            padding-top: 40px;
        }

        .empty-state {
            color: #999;
            font-style: italic;
            padding: 16px 0;
        }
        .error-state {
            color: #c00;
            padding-top: 40px;
        }

        /* Search input */
        .search-wrap {
            padding: 12px 16px 0;
        }
        .search-wrap input {
            width: 100%;
            padding: 6px 10px;
            font-size: 0.85em;
            font-family: inherit;
            background: #222;
            border: 1px solid #444;
            border-radius: 3px;
            color: #fff;
            outline: none;
        }
        .search-wrap input::placeholder { color: #666; }
        .search-wrap input:focus { border-color: #888; }

        /* Dimmed writer when no results */
        .writer-list li.dimmed { opacity: 0.35; }

        /* All-notes flat list */
        .all-notes-list {
            list-style: none;
            max-width: 600px;
        }
        .all-notes-list li {
            display: flex;
            align-items: baseline;
            gap: 10px;
            padding: 9px 0;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
        }
        .all-notes-list li:hover { background: #fafafa; }
        .card-date {
            font-size: 0.9em;
            color: #555;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .card-author {
            font-size: 0.95em;
            color: #111;
            font-weight: 500;
        }
        .card-tags {
            font-size: 0.78em;
            color: #999;
        }


        /* Mobile menu button (hidden on desktop) */
        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
            flex-direction: column;
            justify-content: center;
            gap: 4px;
            flex-shrink: 0;
        }
        .mobile-menu-btn span {
            display: block;
            height: 2px;
            width: 20px;
            background: #111;
            border-radius: 1px;
        }

        /* Sidebar overlay (mobile) */
        .sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 19;
        }
        .sidebar-overlay.open { display: block; }

        /* Mobile layout */
        @media (max-width: 640px) {
            .mobile-menu-btn { display: flex; }
            .sidebar {
                position: fixed;
                top: 0; left: 0; bottom: 0;
                transform: translateX(-100%);
                transition: transform 0.25s ease;
                z-index: 20;
            }
            .sidebar.open { transform: translateX(0); }
            .date-drawer { left: 0; }
            .main { padding: 16px; }
            .page-header { padding: 12px 16px; }
            .page-header h1 { font-size: 1.4em; }
            .page-header img { width: 44px; height: 44px; }
        }

        /* Auth button */
        .auth-btn {
            margin-left: auto;
            background: none;
            border: 1px solid #ccc;
            border-radius: 3px;
            padding: 5px 10px;
            font-size: 0.8em;
            font-family: inherit;
            cursor: pointer;
            color: #555;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .auth-btn:hover { border-color: #999; color: #111; }
        .auth-btn.signed-in { border-color: #3a3; color: #3a3; }

        /* Edit / New Note buttons */
        .edit-note-btn {
            display: none;
            margin-left: auto;
            background: none;
            border: 1px solid #bbb;
            border-radius: 3px;
            padding: 3px 10px;
            font-size: 0.8em;
            font-family: inherit;
            cursor: pointer;
            color: #555;
        }
        .edit-note-btn:hover { border-color: #555; color: #111; }
        .new-note-btn {
            display: none;
            margin: 8px 16px 16px;
            padding: 7px 12px;
            background: #fff;
            color: #111;
            border: none;
            border-radius: 3px;
            font-size: 0.85em;
            font-family: inherit;
            cursor: pointer;
            font-weight: bold;
            text-align: left;
        }
        .new-note-btn:hover { background: #eee; }

        /* Editor overlay + panel */
        .editor-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            z-index: 50;
        }
        .editor-overlay.open { display: block; }
        .editor-panel {
            display: none;
            position: fixed;
            top: 0; right: 0; bottom: 0;
            width: min(640px, 100vw);
            background: #fff;
            z-index: 51;
            flex-direction: column;
            box-shadow: -4px 0 24px rgba(0,0,0,0.15);
        }
        .editor-panel.open { display: flex; }
        .editor-panel-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 16px;
            border-bottom: 1px solid #eee;
            flex-shrink: 0;
        }
        .editor-panel-title {
            font-size: 0.95em;
            font-weight: bold;
            color: #333;
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .editor-tabs {
            display: flex;
            gap: 4px;
        }
        .editor-tabs button {
            padding: 4px 12px;
            font-size: 0.8em;
            font-family: inherit;
            border: 1px solid #ccc;
            background: none;
            border-radius: 3px;
            cursor: pointer;
            color: #555;
        }
        .editor-tabs button.active { background: #111; color: #fff; border-color: #111; }
        .editor-format-toggle {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.78em;
            color: #888;
            flex-shrink: 0;
        }
        .editor-format-toggle select {
            font-size: 0.85em;
            font-family: inherit;
            border: 1px solid #ccc;
            border-radius: 3px;
            padding: 2px 4px;
            background: #fff;
        }
        .editor-close-btn {
            background: none;
            border: none;
            font-size: 1.3em;
            cursor: pointer;
            color: #888;
            padding: 2px 6px;
            line-height: 1;
            flex-shrink: 0;
        }
        .editor-close-btn:hover { color: #111; }
        .editor-body {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding: 12px 16px;
            gap: 10px;
        }
        .editor-new-fields {
            display: none;
            flex-direction: column;
            gap: 8px;
            padding-bottom: 8px;
            border-bottom: 1px solid #eee;
            flex-shrink: 0;
        }
        .editor-new-fields.open { display: flex; }
        .editor-field {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }
        .editor-field label {
            font-size: 0.75em;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }
        .editor-field input {
            padding: 5px 8px;
            border: 1px solid #ccc;
            border-radius: 3px;
            font-size: 0.9em;
            font-family: inherit;
        }
        .editor-field input:focus { outline: none; border-color: #888; }
        .editor-field .field-hint {
            font-size: 0.72em;
            color: #bbb;
        }
        .editor-write-pane {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .editor-write-pane.hidden { display: none; }
        .editor-textarea {
            flex: 1;
            resize: none;
            border: 1px solid #ddd;
            border-radius: 3px;
            padding: 10px;
            font-family: 'Menlo', 'Monaco', 'Courier New', monospace;
            font-size: 0.85em;
            line-height: 1.6;
            color: #111;
            outline: none;
        }
        .editor-textarea:focus { border-color: #888; }
        .editor-preview-pane {
            flex: 1;
            overflow-y: auto;
            border: 1px solid #ddd;
            border-radius: 3px;
            padding: 12px 16px;
            display: none;
            line-height: 1.7;
            font-size: 0.95em;
        }
        .editor-preview-pane.active { display: block; }
        .editor-preview-pane h1, .editor-preview-pane h2, .editor-preview-pane h3 { margin: 1em 0 0.4em; }
        .editor-preview-pane p { margin: 0.5em 0; }
        .editor-preview-pane ul, .editor-preview-pane ol { padding-left: 1.5em; margin: 0.5em 0; }
        .editor-preview-pane pre { background: #f5f5f5; padding: 10px; border-radius: 3px; overflow-x: auto; }
        .editor-preview-pane code { background: #f5f5f5; padding: 2px 5px; border-radius: 2px; }
        .editor-footer {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 16px;
            border-top: 1px solid #eee;
            flex-shrink: 0;
        }
        .editor-save-btn {
            padding: 7px 18px;
            background: #111;
            color: #fff;
            border: none;
            border-radius: 3px;
            font-size: 0.9em;
            font-family: inherit;
            cursor: pointer;
            font-weight: bold;
        }
        .editor-save-btn:hover { background: #333; }
        .editor-save-btn:disabled { background: #ccc; cursor: not-allowed; }
        .editor-status {
            font-size: 0.82em;
            color: #888;
            flex: 1;
        }
        .editor-status.error { color: #c00; }
        .editor-status.success { color: #3a3; }

        /* Print styles */
        @media print {
            html, body { height: auto; overflow: visible; }
            .page-header, .sidebar, .sidebar-overlay,
            .date-drawer, .note-header { display: none !important; }
            .layout { display: block; }
            .main { padding: 0; overflow: visible; height: auto; }
            .note-view { display: block !important; }
            .note-body a::after { content: " (" attr(href) ")"; font-size: 0.85em; color: #555; }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/turndown@7/dist/turndown.min.js"></script>
</head>

            </div>
        </div>
        <button class="auth-btn" id="authBtn">sign in to edit</button>
    </div>

    <div class="layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-nav">
                <a href="https://levinelabs.co.il/anny.html">100devs</a>
                <span class="sep">|</span>
                <a href="javascript:void(0)" class="active">our notes</a>
            </div>

            <div class="search-wrap">
                <input type="search" id="searchInput" placeholder="search notes..." autocomplete="off">
            </div>

            <div class="sidebar-section">
                <h3>filters</h3>
                <div class="tag-filters" id="tagFilters"></div>
            </div>

            <div class="sidebar-section">
                <h3>writers</h3>
                <ul class="writer-list" id="writerList"></ul>
            </div>
            <button class="new-note-btn" id="newNoteBtn">+ new note</button>
        </aside>

        <!-- Date drawer (slides out from under sidebar) -->
        <div class="date-drawer" id="dateDrawer">
            <div class="drawer-header">
                <h3 id="drawerTitle">dates</h3>
                <button class="drawer-close" id="drawerClose" aria-label="Close date list">
                    <span></span><span></span><span></span>
                </button>
            </div>
            <ul class="drawer-list" id="drawerList"></ul>
        </div>

        <!-- Main content area -->
        <div class="main" id="mainContent">
            <div class="prompt" id="promptState">Select a writer to view their notes.</div>

            <div class="writer-view" id="writerView" style="display:none;">
                <h2 id="writerName"></h2>
                <ul class="date-list" id="dateList"></ul>
                <div class="empty-state" id="emptyDates" style="display:none;">No notes match the current filters.</div>
            </div>

            <div class="all-notes-view" id="allNotesView" style="display:none;">
                <ul class="all-notes-list" id="allNotesList"></ul>
                <div class="empty-state" id="allNotesEmpty" style="display:none;">No notes match.</div>
            </div>

            <div class="note-view" id="noteView">
                <div class="note-header" id="noteHeader">
                    <button class="hamburger" id="noteHamburger" aria-label="Toggle date list">
                        <span></span><span></span><span></span>
                    </button>
                    <span class="note-header-label" id="noteHeaderLabel"></span>
                    <button class="edit-note-btn" id="editNoteBtn">edit</button>
                </div>
                <div class="note-meta" id="noteMeta"></div>
                <div class="note-body" id="noteBody"></div>
            </div>
        </div>
    </div>

<!-- ── Editor panel ─────────────────────────────────────────── -->
<div class="editor-panel" id="editorPanel">
    <div class="editor-panel-header">
        <span class="editor-panel-title" id="editorTitle">Edit note</span>
        <div class="editor-tabs">
            <button id="tabWrite" class="active" type="button">Write</button>
            <button id="tabPreview" type="button">Preview</button>
        </div>
        <div class="editor-format-toggle">
            <label for="editorFormat">format:</label>
            <select id="editorFormat">
                <option value="markdown">Markdown</option>
                <option value="html">HTML</option>
            </select>
        </div>
        <button class="editor-close-btn" id="editorCloseBtn" aria-label="Close editor">&times;</button>
    </div>
    <div class="editor-body">
        <div class="editor-new-fields" id="editorNewFields">
            <div class="editor-field">
                <label>Author slug <span class="field-hint">(folder name, lowercase, no spaces)</span></label>
                <input type="text" id="newAuthorSlug" placeholder="e.g. annylevine">
            </div>
            <div class="editor-field">
                <label>Display name</label>
                <input type="text" id="newAuthorName" placeholder="e.g. Anny Levine">
            </div>
            <div class="editor-field">
                <label>Huddle date <span class="field-hint">(YYYY-MM-DD)</span></label>
                <input type="date" id="newDate">
            </div>
            <div class="editor-field">
                <label>Tags <span class="field-hint">(comma-separated, from approved list)</span></label>
                <input type="text" id="newTags" placeholder="the-hunt, networking">
            </div>
        </div>
        <div class="editor-write-pane" id="editorWritePane">
            <textarea class="editor-textarea" id="editorTextarea" spellcheck="false" placeholder="Write your note in Markdown..."></textarea>
        </div>
        <div class="editor-preview-pane" id="editorPreviewPane"></div>
    </div>
    <div class="editor-footer">
        <button class="editor-save-btn" id="editorSaveBtn">Save</button>
        <span class="editor-status" id="editorStatus"></span>
    </div>
</div>

<script>
    let notes = [];
    let selectedTags = new Set();
    let selectedWriter = null; // null = none, '__all__' = all notes, string = specific writer
    let searchQuery = '';

    async function load() {
        try {
            const res = await fetch('index.json');
            if (!res.ok) throw new Error('Failed to load notes (' + res.status + ')');
            notes = await res.json();
            buildSidebar();
        } catch (err) {
            document.getElementById('promptState').className = 'error-state';
            document.getElementById('promptState').textContent = 'Could not load notes: ' + err.message;
        }
        return true;
    }

    function formatDate(iso) {
        var parts = String(iso).slice(0, 10).split('-');
        if (parts.length !== 3) return iso;
        return parts[2] + '/' + parts[1] + '/' + parts[0];
    }

    function escapeHtml(s) {
        const d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
    }

    function stripHtml(html) {
        const d = document.createElement('div');
        d.innerHTML = html;
        return d.textContent || '';
    }

    function matchesSearch(note, query) {
        if (!query) return true;
        const q = query.toLowerCase();
        return note.author.toLowerCase().includes(q)
            || note.date.includes(q)
            || note.tags.some(t => t.toLowerCase().includes(q))
            || stripHtml(note.html).toLowerCase().includes(q);
    }

    function getWriters() {
        const map = {};
        notes.forEach(n => {
            if (!map[n.author]) map[n.author] = 0;
            map[n.author]++;
        });
        return Object.entries(map).sort((a, b) => a[0].localeCompare(b[0]));
    }

    function getTags() {
        const s = new Set();
        notes.forEach(n => n.tags.forEach(t => s.add(t)));
        return [...s].sort();
    }

    function getWriterNotes(author) {
        return notes
            .filter(n => n.author === author)
            .filter(n => selectedTags.size === 0 || n.tags.some(t => selectedTags.has(t)))
            .filter(n => matchesSearch(n, searchQuery))
            .sort((a, b) => b.date.localeCompare(a.date));
    }

    function getAllNotes() {
        return notes
            .filter(n => selectedTags.size === 0 || n.tags.some(t => selectedTags.has(t)))
            .filter(n => matchesSearch(n, searchQuery))
            .sort((a, b) => b.date.localeCompare(a.date));
    }

    function buildSidebar() {
        const tags = getTags();
        const tagEl = document.getElementById('tagFilters');
        tagEl.innerHTML = tags.map(t =>
            '<button type="button" data-tag="' + t + '">' + escapeHtml(t) + '</button>'
        ).join('');
        tagEl.querySelectorAll('button').forEach(btn => {
            btn.onclick = function() {
                var tag = btn.dataset.tag;
                if (selectedTags.has(tag)) selectedTags.delete(tag);
                else selectedTags.add(tag);
                btn.classList.toggle('active');
                updateWriterCounts();
                if (selectedWriter === '__all__') showAllNotes();
                else if (selectedWriter) showWriter(selectedWriter);
            };
        });
        updateWriterCounts();
    }

    function updateWriterCounts() {
        var allFiltered = getAllNotes();
        var writers = getWriters();
        var listEl = document.getElementById('writerList');
        var hasActiveFilter = selectedTags.size > 0 || searchQuery;

        var allCls = selectedWriter === '__all__' ? 'active' : '';
        if (allFiltered.length === 0 && hasActiveFilter) allCls += ' dimmed';
        var allItem = '<li class="' + allCls + '" data-author="__all__">'
            + 'All notes'
            + '<span class="note-count">(' + allFiltered.length + ')</span>'
            + '</li>';

        listEl.innerHTML = allItem + writers.map(function(w) {
            var author = w[0];
            var filtered = getWriterNotes(author);
            var cls = selectedWriter === author ? 'active' : '';
            if (filtered.length === 0 && hasActiveFilter) cls += ' dimmed';
            return '<li class="' + cls + '" data-author="' + escapeHtml(author) + '">'
                + escapeHtml(author)
                + '<span class="note-count">(' + filtered.length + ')</span>'
                + '</li>';
        }).join('');

        listEl.querySelectorAll('li').forEach(function(li) {
            li.onclick = function() {
                if (li.dataset.author === '__all__') showAllNotes();
                else showWriter(li.dataset.author);
            };
        });
    }

    function tagTooltip(n) {
        var visible = n.tags.filter(function(t) { return t !== 'the-hunt'; });
        return visible.length ? visible.join(', ') : '';
    }

    function buildDateItems(filtered, container, onClickNote) {
        container.innerHTML = filtered.map(function(n) {
            return '<li data-slug="' + n.slug + '" title="' + escapeHtml(tagTooltip(n)) + '">'
                + formatDate(n.date)
                + '</li>';
        }).join('');
        container.querySelectorAll('li').forEach(function(li) {
            li.onclick = function() { onClickNote(li.dataset.slug); };
        });
    }

    function showAllNotes() {
        selectedWriter = '__all__';
        updateWriterCounts();
        closeDrawer();

        document.getElementById('promptState').style.display = 'none';
        document.getElementById('noteView').classList.remove('active');
        document.getElementById('writerView').style.display = 'none';
        var av = document.getElementById('allNotesView');
        av.style.display = '';

        var filtered = getAllNotes();
        var listEl = document.getElementById('allNotesList');
        var emptyEl = document.getElementById('allNotesEmpty');

        if (filtered.length === 0) {
            listEl.innerHTML = '';
            emptyEl.style.display = '';
            return;
        }
        emptyEl.style.display = 'none';
        listEl.innerHTML = filtered.map(function(n) {
            var extraTags = n.tags.filter(function(t) { return t !== 'the-hunt'; });
            return '<li data-slug="' + n.slug + '">'
                + '<span class="card-date">' + escapeHtml(formatDate(n.date)) + '</span>'
                + '<span class="card-author">' + escapeHtml(n.author) + '</span>'
                + (extraTags.length ? '<span class="card-tags">' + escapeHtml(extraTags.join(', ')) + '</span>' : '')
                + '</li>';
        }).join('');
        listEl.querySelectorAll('li').forEach(function(li) {
            li.onclick = function() { showNote(li.dataset.slug); };
        });
    }

    function showWriter(author) {
        selectedWriter = author;
        updateWriterCounts();
        closeDrawer();

        document.getElementById('promptState').style.display = 'none';
        document.getElementById('noteView').classList.remove('active');
        document.getElementById('allNotesView').style.display = 'none';
        var wv = document.getElementById('writerView');
        wv.style.display = '';

        document.getElementById('writerName').textContent = author;

        var filtered = getWriterNotes(author);
        var dateEl = document.getElementById('dateList');
        var emptyEl = document.getElementById('emptyDates');

        if (filtered.length === 0) {
            dateEl.innerHTML = '';
            emptyEl.style.display = '';
            return;
        }
        emptyEl.style.display = 'none';
        buildDateItems(filtered, dateEl, showNote);
    }

    function populateDrawer(author) {
        var filtered = getWriterNotes(author);
        var list = document.getElementById('drawerList');
        document.getElementById('drawerTitle').textContent = author;
        buildDateItems(filtered, list, function(slug) {
            closeDrawer();
            showNote(slug);
        });
    }

    function toggleDrawer() {
        document.getElementById('dateDrawer').classList.toggle('open');
    }

    function closeDrawer() {
        document.getElementById('dateDrawer').classList.remove('open');
    }

    function showNote(slug) {
        var note = notes.find(function(n) { return n.slug === slug; });
        if (!note) return;

        closeDrawer();
        document.getElementById('writerView').style.display = 'none';
        document.getElementById('allNotesView').style.display = 'none';
        var nv = document.getElementById('noteView');
        nv.classList.add('active');

        document.getElementById('noteHeaderLabel').textContent = note.author + "'s notes";
        populateDrawer(note.author);

        document.getElementById('noteMeta').innerHTML = '<strong>' + escapeHtml(formatDate(note.date)) + '</strong>'
            + (note.tags.length ? ' · ' + escapeHtml(note.tags.join(', ')) : '');
        document.getElementById('noteBody').innerHTML = DOMPurify.sanitize(note.html);

        document.getElementById('noteHamburger').onclick = toggleDrawer;
        document.getElementById('noteHeaderLabel').onclick = toggleDrawer;

        document.querySelector('.main').scrollTop = 0;
    }

    // ── Deep linking ──────────────────────────────────────────────
    function setHash(slug) {
        history.replaceState(null, '', slug ? '#' + slug : location.pathname + location.search);
    }

    function updateMeta(title, description) {
        document.title = title;
        document.getElementById('ogTitle').setAttribute('content', title);
        document.getElementById('ogDesc').setAttribute('content', description);
        document.getElementById('ogUrl').setAttribute('content', location.href);
        document.getElementById('twTitle').setAttribute('content', title);
        document.getElementById('twDesc').setAttribute('content', description);
        document.getElementById('metaDesc').setAttribute('content', description);
    }

    function navigateToHash() {
        var slug = location.hash.slice(1);
        if (!slug || !notes.length) return;
        var note = notes.find(function(n) { return n.slug === slug; });
        if (note) showNote(slug, true);
    }

    // ── Mobile sidebar ────────────────────────────────────────────
    function openSidebar() {
        document.querySelector('.sidebar').classList.add('open');
        document.getElementById('sidebarOverlay').classList.add('open');
    }
    function closeSidebar() {
        document.querySelector('.sidebar').classList.remove('open');
        document.getElementById('sidebarOverlay').classList.remove('open');
    }

    // ── Wrap showNote to add deep linking + title + OG ──────────
    var _baseShowNote = showNote;
    showNote = function(slug, fromHash) {
        _baseShowNote(slug);
        closeSidebar();
        var note = notes.find(function(n) { return n.slug === slug; });
        if (!note) return;
        if (!fromHash) setHash(slug);
        var desc = stripHtml(note.html).trim().slice(0, 160).replace(/\s+/g, ' ');
        updateMeta(note.author + ' · ' + formatDate(note.date) + ' — 100Devs Notes', desc);
    };

    var _origShowWriter = showWriter;
    showWriter = function(author) {
        _origShowWriter(author);
        closeSidebar();
        setHash('');
        updateMeta('100Devs Notes', 'Community-maintained archive of notes from 100Devs huddle sessions.');
    };

    var _origShowAllNotes = showAllNotes;
    showAllNotes = function() {
        _origShowAllNotes();
        closeSidebar();
        setHash('');
        updateMeta('100Devs Notes', 'Community-maintained archive of notes from 100Devs huddle sessions.');
    };

    load().then(navigateToHash);
    document.getElementById('drawerClose').onclick = closeDrawer;
    document.getElementById('searchInput').addEventListener('input', function() {
        searchQuery = this.value.trim();
        updateWriterCounts();
        if (selectedWriter === '__all__') showAllNotes();
        else if (selectedWriter) showWriter(selectedWriter);
    });
    document.getElementById('mobileMenuBtn').onclick = openSidebar;
    document.getElementById('sidebarOverlay').onclick = closeSidebar;
    window.addEventListener('hashchange', navigateToHash);

    // ── Editor / Auth ─────────────────────────────────────────────

    const REPO = 'JoshWrites/100devs-notes';
    const BRANCH = 'main';

    let ghToken = sessionStorage.getItem('gh_token') || '';
    let ghUser = null;
    let editorSlug = null;
    let editorSha = null;
    let editorTab = 'write'; // 'write' | 'preview'

    function setEditorStatus(msg, type) {
        var el = document.getElementById('editorStatus');
        el.textContent = msg;
        el.className = 'editor-status' + (type ? ' ' + type : '');
    }

    function updateAuthUI() {
        var btn = document.getElementById('authBtn');
        var editBtn = document.getElementById('editNoteBtn');
        var newBtn = document.getElementById('newNoteBtn');
        if (ghUser) {
            btn.textContent = ghUser.login + ' · sign out';
            btn.classList.add('signed-in');
            btn.onclick = signOut;
            editBtn.style.display = '';
            newBtn.style.display = '';
        } else {
            btn.textContent = 'sign in to edit';
            btn.classList.remove('signed-in');
            btn.onclick = signIn;
            editBtn.style.display = 'none';
            newBtn.style.display = 'none';
        }
    }

    async function signIn() {
        var token = prompt('Enter your GitHub Personal Access Token\n(needs "repo" scope for write access):');
        if (!token || !token.trim()) return;
        token = token.trim();
        try {
            var res = await fetch('https://api.github.com/user', {
                headers: { Authorization: 'token ' + token }
            });
            if (!res.ok) throw new Error('Token rejected by GitHub');
            ghUser = await res.json();
            ghToken = token;
            sessionStorage.setItem('gh_token', ghToken);
            updateAuthUI();
        } catch (e) {
            alert('Could not sign in: ' + e.message);
        }
    }

    function signOut() {
        ghToken = '';
        ghUser = null;
        sessionStorage.removeItem('gh_token');
        updateAuthUI();
    }

    async function restoreSession() {
        if (!ghToken) return;
        try {
            var res = await fetch('https://api.github.com/user', {
                headers: { Authorization: 'token ' + ghToken }
            });
            if (res.ok) {
                ghUser = await res.json();
                updateAuthUI();
            } else {
                sessionStorage.removeItem('gh_token');
                ghToken = '';
            }
        } catch (e) {
            // network error — leave token in place, just don't show as signed in
        }
    }

    // ── GitHub API helpers ────────────────────────────────────────

    async function ghGet(path) {
        var res = await fetch('https://api.github.com/repos/' + REPO + '/contents/' + path + '?ref=' + BRANCH, {
            headers: { Authorization: 'token ' + ghToken, Accept: 'application/vnd.github+json' }
        });
        if (!res.ok) throw new Error('GitHub API error: ' + res.status);
        return await res.json();
    }

    async function ghPut(path, utf8Content, sha, commitMessage) {
        var encoded = btoa(unescape(encodeURIComponent(utf8Content)));
        var body = { message: commitMessage, content: encoded, branch: BRANCH };
        if (sha) body.sha = sha;
        var res = await fetch('https://api.github.com/repos/' + REPO + '/contents/' + path, {
            method: 'PUT',
            headers: {
                Authorization: 'token ' + ghToken,
                Accept: 'application/vnd.github+json',
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(body)
        });
        if (!res.ok) {
            var err = await res.json().catch(() => ({}));
            throw new Error(err.message || 'Save failed (' + res.status + ')');
        }
        return await res.json();
    }

    // ── Editor open/close ─────────────────────────────────────────

    function openEditorPanel() {
        document.getElementById('editorPanel').classList.add('open');
        document.getElementById('editorOverlay').classList.add('open');
    }

    function closeEditorPanel() {
        document.getElementById('editorPanel').classList.remove('open');
        document.getElementById('editorOverlay').classList.remove('open');
        document.getElementById('editorNewFields').classList.remove('open');
        setEditorStatus('');
        editorSlug = null;
        editorSha = null;
    }

    function setEditorTab(tab) {
        editorTab = tab;
        document.getElementById('tabWrite').classList.toggle('active', tab === 'write');
        document.getElementById('tabPreview').classList.toggle('active', tab === 'preview');
        document.getElementById('editorWritePane').classList.toggle('hidden', tab === 'preview');
        document.getElementById('editorPreviewPane').classList.toggle('active', tab === 'preview');
        if (tab === 'preview') updateEditorPreview();
    }

    function updateEditorPreview() {
        var raw = document.getElementById('editorTextarea').value;
        var fmt = document.getElementById('editorFormat').value;
        var html;
        if (fmt === 'html') {
            html = raw;
        } else {
            var body = raw.replace(/^---[\s\S]*?---\n+/, '');
            html = marked.parse(body);
        }
        document.getElementById('editorPreviewPane').innerHTML = DOMPurify.sanitize(html);
    }

    async function openEditNote(slug) {
        editorSlug = slug;
        editorSha = null;
        document.getElementById('editorTitle').textContent = 'Edit: ' + slug;
        document.getElementById('editorNewFields').classList.remove('open');
        document.getElementById('editorTextarea').value = '';
        document.getElementById('editorFormat').value = 'markdown';
        setEditorTab('write');
        setEditorStatus('Loading…');
        openEditorPanel();
        try {
            var file = await ghGet('notes/' + slug + '.md');
            editorSha = file.sha;
            var content = decodeURIComponent(escape(atob(file.content.replace(/\n/g, ''))));
            document.getElementById('editorTextarea').value = content;
            setEditorStatus('');
        } catch (e) {
            setEditorStatus('Error loading note: ' + e.message, 'error');
        }
    }

    function openNewNote() {
        editorSlug = null;
        editorSha = null;
        document.getElementById('editorTitle').textContent = 'New note';
        document.getElementById('editorNewFields').classList.add('open');
        document.getElementById('editorTextarea').value = '';
        document.getElementById('newDate').value = new Date().toISOString().slice(0, 10);
        document.getElementById('newTags').value = 'the-hunt';
        document.getElementById('editorFormat').value = 'markdown';
        setEditorTab('write');
        setEditorStatus('');
        openEditorPanel();
    }

    // ── Save ──────────────────────────────────────────────────────

    async function saveEditor() {
        var btn = document.getElementById('editorSaveBtn');
        btn.disabled = true;
        setEditorStatus('Saving…');

        try {
            var raw = document.getElementById('editorTextarea').value;
            var fmt = document.getElementById('editorFormat').value;

            // Convert HTML → Markdown if needed
            var finalContent = raw;
            if (fmt === 'html') {
                var td = new TurndownService({ headingStyle: 'atx', codeBlockStyle: 'fenced' });
                finalContent = td.turndown(raw);
            }

            if (editorSlug) {
                // ── Update existing note ──
                await ghPut(
                    'notes/' + editorSlug + '.md',
                    finalContent,
                    editorSha,
                    'Update notes: ' + editorSlug
                );
                setEditorStatus('Saved! CI will rebuild the index shortly.', 'success');
            } else {
                // ── Create new note ──
                var authorSlug = document.getElementById('newAuthorSlug').value.trim();
                var authorName = document.getElementById('newAuthorName').value.trim();
                var date = document.getElementById('newDate').value.trim();
                var tags = document.getElementById('newTags').value
                    .split(',').map(function(t) { return t.trim(); }).filter(Boolean);

                if (!authorSlug || !authorName || !date) {
                    setEditorStatus('Author slug, display name, and date are required.', 'error');
                    btn.disabled = false;
                    return;
                }

                var frontmatter = '---\ntags:\n'
                    + (tags.length ? tags : ['the-hunt']).map(function(t) { return '  - ' + t; }).join('\n')
                    + '\nauthor: ' + authorName
                    + '\ndate: ' + date
                    + '\n---\n\n';

                await ghPut(
                    'notes/' + authorSlug + '/' + date + '.md',
                    frontmatter + finalContent,
                    null,
                    'Add huddle notes: ' + date + ' (' + authorName + ')'
                );
                setEditorStatus('Note created! CI will rebuild the index in a moment.', 'success');
            }
        } catch (e) {
            setEditorStatus(e.message, 'error');
        }

        btn.disabled = false;
    }

    // ── Wire up editor events ─────────────────────────────────────

    document.getElementById('editorCloseBtn').onclick = closeEditorPanel;
    document.getElementById('editorOverlay').onclick = closeEditorPanel;
    document.getElementById('editorSaveBtn').onclick = saveEditor;
    document.getElementById('newNoteBtn').onclick = openNewNote;
    document.getElementById('tabWrite').onclick = function() { setEditorTab('write'); };
    document.getElementById('tabPreview').onclick = function() { setEditorTab('preview'); };
    document.getElementById('editorFormat').onchange = function() {
        if (editorTab === 'preview') updateEditorPreview();
    };
    document.getElementById('editNoteBtn').onclick = function() {
        if (editorSlug) openEditNote(editorSlug);
    };

    // Update editNoteBtn to track the current note slug
    var _baseShowNoteForEdit = showNote;
    showNote = function(slug, fromHash) {
        _baseShowNoteForEdit(slug, fromHash);
        document.getElementById('editNoteBtn').dataset.slug = slug;
        document.getElementById('editNoteBtn').onclick = function() { openEditNote(slug); };
    };

    updateAuthUI();
    restoreSession();
</script>

</body>
</html>
